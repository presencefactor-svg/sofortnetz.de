    <script>
        let plansData = [];
        const countryToIso = {
            "germany": "de", "deutschland": "de", "france": "fr", "frankreich": "fr",
            "italy": "it", "italien": "it", "spain": "es", "spanien": "es",
            "united kingdom": "gb", "uk": "gb", "grossbritannien": "gb", "england": "gb",
            "usa": "us", "united states": "us", "vereinigte staaten": "us", "america": "us",
            "turkey": "tr", "türkei": "tr", "austria": "at", "österreich": "at",
            "switzerland": "ch", "schweiz": "ch", "netherlands": "nl", "niederlande": "nl",
            "belgium": "be", "belgien": "be", "portugal": "pt", "greece": "gr", "griechenland": "gr",
            "poland": "pl", "polen": "pl", "czech": "cz", "tschechien": "cz",
            "denmark": "dk", "dänemark": "dk", "sweden": "se", "schweden": "se",
            "norway": "no", "norwegen": "no", "finland": "fi", "finnland": "fi",
            "ireland": "ie", "irland": "ie", "croatia": "hr", "kroatien": "hr",
            "serbia": "rs", "serbien": "rs", "bulgaria": "bg", "bulgarien": "bg",
            "romania": "ro", "rumänien": "ro", "hungary": "hu", "ungarn": "hu",
            "slovakia": "sk", "slowakei": "sk", "slovenia": "si", "slowenien": "si",
            "cyprus": "cy", "zypern": "cy", "malta": "mt", "estonia": "ee",

        };

        function loadPlans() {
            // Check if Papa is loaded
            if (typeof Papa === 'undefined') {
                console.warn('PapaParse not loaded yet, retrying...');
                setTimeout(loadPlans, 500);
                return;
            }
            const sheetId = '1BcTMcXHP5Sj5_d5RjA2DaS6x2UUjTkDv';
            const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;

            Papa.parse(csvUrl, {
                header: true,
                download: true,
                dynamicTyping: false,
                skipEmptyLines: true,
                complete: function (results) {
                    if (!results.data || results.data.length === 0) {
                        document.getElementById('loading').innerHTML = '<p class="text-red-400">Error loading plans.</p>';
                        return;
                    }

                    plansData = results.data.filter(row =>
                        row['Plan Name'] && row['Plan Name'].trim() &&
                        row['Retail EUR'] && row['Retail EUR'].trim() &&
                        row['Direct Link'] && row['Direct Link'].trim()
                    );

                    if (plansData.length === 0) {
                        document.getElementById('loading').innerHTML = '<p class="text-red-400">No plans available.</p>';
                        return;
                    }

                    populateDropdown();
                    document.getElementById('loading').classList.add('hidden');
                },
                error: function (error) {
                    document.getElementById('loading').innerHTML = '<p class="text-red-400">Error loading plans.</p>';
                }
            });
        }

        function populateDropdown() {
            const select = document.getElementById('plan-select');
            select.innerHTML = '<option value="">Choose a plan...</option>';

            plansData.forEach((plan, index) => {
                const option = document.createElement('option');
                option.value = index;
                const price = plan['Retail EUR'].trim();
                const displayPrice = price.includes('€') ? price : '€' + price;
                option.textContent = `${plan['Plan Name'].trim()} - ${displayPrice}`;
                select.appendChild(option);
            });
        }

        function createRelatedPlanCard(plan) {
            const div = document.createElement('div');
            div.className = 'panel flex flex-col items-center p-6 rounded-xl border border-slate-700/60 relative transition duration-300 hover:scale-[1.02] hover:-translate-y-1';

            const price = plan['Retail EUR'].trim();
            const displayPrice = price.includes('€') ? price : '€' + price;
            const planName = plan['Plan Name'].trim();
            const link = plan['Direct Link'].trim();

            let isoCode = plan['ISO'] || plan['iso'] || plan['Code'] || plan['code'] || plan['ISO Code'] || plan['Country Code'] || plan['iso2'] || plan['ISO2'];
            if (!isoCode) {
                const nameLower = planName.toLowerCase();
                const sortedKeys = Object.keys(countryToIso).sort((a, b) => b.length - a.length);
                for (const name of sortedKeys) {
                    if (nameLower.includes(name)) {
                        isoCode = countryToIso[name];
                        break;
                    }
                }
            }
            
            const flagSrc = isoCode ? `https://flagcdn.com/w80/${isoCode.trim().toLowerCase()}.png` : "https://cdn-icons-png.flaticon.com/512/921/921490.png";

            div.innerHTML = `
                <img src="${flagSrc}" alt="Flag" class="w-16 h-auto rounded-md shadow-lg mb-4 object-cover" onerror="this.src='https://cdn-icons-png.flaticon.com/512/921/921490.png'; this.classList.add('p-2', 'bg-slate-800');">
                <h4 class="text-base font-bold text-white text-center mb-3 h-12 flex items-center justify-center">${planName}</h4>
                <div class="flex flex-col items-center mt-auto pt-4">
                    <span class="text-5xl font-extrabold text-blue-400 mb-4">${displayPrice}</span>
                    <a href="${link}" target="_blank" rel="noopener noreferrer" class="btn-primary w-full py-2 rounded-lg font-bold text-white uppercase text-center">Buy Now</a>
                </div>
            `;

            return div;
        }

        function populateRelatedServices(selectedPlan) {
            const grid = document.getElementById('related-services-grid');
            grid.innerHTML = '';

            const otherPlans = plansData.filter(p => p !== selectedPlan);
            const shuffled = otherPlans.sort(() => 0.5 - Math.random());
            const plansToShow = shuffled.slice(0, 9);

            plansToShow.forEach(plan => {
                grid.appendChild(createRelatedPlanCard(plan));
            });
        }

        function selectPlan(index) {
            if (index === "" || index === null) {
                document.getElementById('plan-details').classList.add('hidden');
                document.getElementById('related-services-container').classList.add('hidden');
                return;
            }

            const plan = plansData[index];
            console.log('Selected plan:', plan);
            const price = plan['Retail EUR'].trim();
            
            // Flag logic
            let isoCode = plan['ISO'] || plan['iso'] || plan['Code'] || plan['code'] || plan['ISO Code'] || plan['Country Code'] || plan['iso2'] || plan['ISO2'];
            
            // If no explicit ISO code, try to map from Plan Name
            if (!isoCode) {
                const countryToIso = {
                    "germany": "de", "deutschland": "de", "france": "fr", "frankreich": "fr",
                    "italy": "it", "italien": "it", "spain": "es", "spanien": "es",
                    "united kingdom": "gb", "uk": "gb", "grossbritannien": "gb", "england": "gb",
                    "usa": "us", "united states": "us", "vereinigte staaten": "us", "america": "us",
                    "turkey": "tr", "türkei": "tr", "austria": "at", "österreich": "at",
                    "switzerland": "ch", "schweiz": "ch", "netherlands": "nl", "niederlande": "nl",
                    "belgium": "be", "belgien": "be", "portugal": "pt", "greece": "gr", "griechenland": "gr",
                    "poland": "pl", "polen": "pl", "czech": "cz", "tschechien": "cz",
                    "denmark": "dk", "dänemark": "dk", "sweden": "se", "schweden": "se",
                    "norway": "no", "norwegen": "no", "finland": "fi", "finnland": "fi",
                    "ireland": "ie", "irland": "ie", "croatia": "hr", "kroatien": "hr",
                    "serbia": "rs", "serbien": "rs", "bulgaria": "bg", "bulgarien": "bg",
                    "romania": "ro", "rumänien": "ro", "hungary": "hu", "ungarn": "hu",
                    "slovakia": "sk", "slowakei": "sk", "slovenia": "si", "slowenien": "si",
                    "cyprus": "cy", "zypern": "cy", "malta": "mt", "estonia": "ee",
                    "latvia": "lv", "lithuania": "lt", "luxembourg": "lu", "iceland": "is",
                    "europe": "eu", "europa": "eu", "china": "cn", "japan": "jp",
                    "south korea": "kr", "korea": "kr", "thailand": "th", "vietnam": "vn",
                    "indonesia": "id", "malaysia": "my", "singapore": "sg",
                    "philippines": "ph", "india": "in", "australia": "au", "new zealand": "nz",
                    "canada": "ca", "mexico": "mx", "brazil": "br", "argentina": "ar",
                    "egypt": "eg", "morocco": "ma", "south africa": "za", "uae": "ae",
                    "dubai": "ae", "israel": "il", "saudi arabia": "sa", "qatar": "qa",
                    "kuwait": "kw", "albania": "al", "macedonia": "mk", "montenegro": "me",
                    "bosnia": "ba", "russia": "ru", "ukraine": "ua", "world": "un", "global": "un"
                };

                const planName = (plan['Plan Name'] || '').toLowerCase();
                
                // Sort keys by length descending to match longer names first (e.g. "United Kingdom" before "United")
                const sortedKeys = Object.keys(countryToIso).sort((a, b) => b.length - a.length);
                
                for (const name of sortedKeys) {
                    if (planName.includes(name)) {
                        isoCode = countryToIso[name];
                        break;
                    }
                }
                
                // Fallback: check if any key in the plan object has a 2-letter value that looks like a code
                if (!isoCode) {
                    const keys = Object.keys(plan);
                    const isoKey = keys.find(k => 
                        (/iso|code/i.test(k) || /country/i.test(k)) && 
                        plan[k] && plan[k].trim().length === 2
                    );
                    if (isoKey) isoCode = plan[isoKey];
                }
            }

            const flagImg = document.getElementById('detail-flag');
            if (isoCode) {
                flagImg.src = `https://flagcdn.com/w80/${isoCode.trim().toLowerCase()}.png`;
                flagImg.classList.remove('hidden');
            } else {
                // Fallback icon (Globe)
                flagImg.src = "https://cdn-icons-png.flaticon.com/512/921/921490.png"; 
                flagImg.classList.remove('hidden');
            }

            document.getElementById('detail-name').textContent = plan['Plan Name'].trim();
            document.getElementById('detail-price').textContent = price.includes('€') ? price : '€' + price;
            document.getElementById('detail-link').href = plan['Direct Link'].trim();
            document.getElementById('plan-details').classList.remove('hidden');

            // Populate and show related services
            populateRelatedServices(plan);
            document.getElementById('related-services-container').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', loadPlans);
    </script>
